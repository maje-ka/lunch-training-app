<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>昼ラン筋トレ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #1a1a1c;
    --surface2: #242426;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --text2: #8a8780;
    --text3: #555350;
    --accent: #c8f060;
    --accent2: #60d4c8;
    --accent3: #f0a060;
    --knee: #60c8a0;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== TOP NAV ===== */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(14,14,15,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 0.5px solid var(--border);
    padding: env(safe-area-inset-top, 0) 20px 0;
  }
  .nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }
  .nav-title {
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .nav-sub {
    font-size: 11px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    margin-top: 1px;
  }
  .nav-badge {
    background: var(--accent);
    color: #1a2a00;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== HOME ===== */
  .home-hero {
    padding: 32px 20px 20px;
    border-bottom: 0.5px solid var(--border);
  }
  .progress-ring-wrap {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 24px;
  }
  .ring-svg { flex-shrink: 0; }
  .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 6; }
  .ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
    transition: stroke-dashoffset 0.6s ease;
  }
  .ring-text-wrap { flex: 1; }
  .ring-pct { font-size: 40px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; line-height: 1; }
  .ring-label { font-size: 13px; color: var(--text2); margin-top: 4px; }
  .ring-time { font-size: 13px; color: var(--text2); margin-top: 8px; }
  .ring-time span { color: var(--text); font-weight: 500; }

  .stat-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 12px;
    text-align: center;
    border: 0.5px solid var(--border);
  }
  .stat-val { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .stat-lbl { font-size: 10px; color: var(--text2); margin-top: 2px; }

  /* ===== MENU LIST ===== */
  .section-head {
    padding: 20px 20px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-head-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
  }
  .section-line { flex: 1; height: 0.5px; background: var(--border); }

  .menu-list { padding: 0 20px; }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
    -webkit-user-select: none;
  }
  .menu-item:active { opacity: 0.6; }
  .menu-item.done .item-name { color: var(--text3); text-decoration: line-through; }
  .menu-item.done .item-check { background: var(--accent); border-color: var(--accent); }
  .menu-item.done .item-check::after { opacity: 1; }

  .item-check {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    flex-shrink: 0;
    position: relative;
    transition: background 0.2s, border-color 0.2s;
  }
  .item-check::after {
    content: '';
    position: absolute;
    left: 7px; top: 4px;
    width: 6px; height: 11px;
    border: 2px solid #1a2a00;
    border-top: none; border-left: none;
    transform: rotate(45deg);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .item-body { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; transition: color 0.2s; }
  .item-meta { font-size: 12px; color: var(--text2); }
  .knee-tag {
    display: inline-block;
    font-size: 10px;
    color: var(--knee);
    border: 0.5px solid var(--knee);
    border-radius: 4px;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
  }

  .item-time {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
    flex-shrink: 0;
  }

  /* ===== START BUTTON ===== */
  .start-wrap {
    padding: 20px;
    position: sticky;
    bottom: 0;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
  }
  .btn-start {
    width: 100%;
    background: var(--accent);
    color: #1a2a00;
    border: none;
    border-radius: var(--radius);
    height: 56px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-start:active { transform: scale(0.98); opacity: 0.85; }
  .btn-start.secondary {
    background: var(--surface2);
    color: var(--text);
  }

  /* ===== TIMER SCREEN ===== */
  .timer-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .timer-progress-bar {
    height: 3px;
    background: var(--surface2);
  }
  .timer-progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 1s linear;
  }

  .timer-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
  }

  .timer-step-num {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--text3);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  .timer-name {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .timer-detail {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 6px;
  }

  .timer-sets {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 40px;
  }
  .timer-sets span { color: var(--accent2); font-weight: 500; }

  .timer-circle {
    position: relative;
    width: 200px;
    height: 200px;
    margin-bottom: 40px;
  }
  .timer-svg { position: absolute; top: 0; left: 0; }
  .timer-bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
  .timer-arc {
    fill: none;
    stroke: var(--accent);
    stroke-width: 8;
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: 50% 50%;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }
  .timer-count {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .timer-num {
    font-size: 64px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    line-height: 1;
    color: var(--accent);
    transition: color 0.3s;
  }
  .timer-unit { font-size: 14px; color: var(--text2); margin-top: 4px; }

  .timer-controls {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 360px;
  }
  .btn-ctrl {
    flex: 1;
    height: 56px;
    border-radius: var(--radius);
    border: none;
    font-size: 15px;
    font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
  }
  .btn-ctrl:active { transform: scale(0.97); opacity: 0.8; }
  .btn-pause {
    background: var(--surface2);
    color: var(--text);
  }
  .btn-next {
    background: var(--accent);
    color: #1a2a00;
    font-weight: 700;
  }
  .btn-skip {
    background: transparent;
    color: var(--text3);
    border: 0.5px solid var(--border) !important;
    flex: 0 0 auto;
    width: 56px;
  }

  /* ===== COMPLETE SCREEN ===== */
  .complete-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }
  .complete-icon {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
  }
  .complete-icon svg { width: 40px; height: 40px; }
  .complete-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .complete-sub { font-size: 15px; color: var(--text2); margin-bottom: 32px; }
  .complete-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 300px;
    margin-bottom: 40px;
  }
  .cstat {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 16px;
    border: 0.5px solid var(--border);
  }
  .cstat-val { font-size: 24px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--accent); }
  .cstat-lbl { font-size: 11px; color: var(--text2); margin-top: 4px; }

  /* ===== REST OVERLAY ===== */
  .rest-overlay {
    position: fixed;
    inset: 0;
    background: rgba(14,14,15,0.95);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .rest-overlay.show { opacity: 1; pointer-events: all; }
  .rest-label { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent2); font-family: 'DM Mono', monospace; margin-bottom: 16px; }
  .rest-num { font-size: 80px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--accent2); line-height: 1; }
  .rest-next { font-size: 15px; color: var(--text2); margin-top: 16px; }
  .rest-next strong { color: var(--text); font-weight: 500; }

  .fade-in { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-inner">
    <div>
      <div class="nav-title">昼休みトレーニング</div>
      <div class="nav-sub">LUNCH WORKOUT</div>
    </div>
    <div class="nav-badge" id="nav-badge">20分</div>
  </div>
</div>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen active">
  <div class="home-hero">
    <div class="progress-ring-wrap">
      <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">
        <circle class="ring-bg" cx="40" cy="40" r="34"/>
        <circle class="ring-fill" id="ring-fill" cx="40" cy="40" r="34"
          stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
      </svg>
      <div class="ring-text-wrap">
        <div class="ring-pct" id="ring-pct">0%</div>
        <div class="ring-label">完了率</div>
        <div class="ring-time" id="ring-time-txt">残り <span>20分</span></div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-val" id="stat-done">0</div>
        <div class="stat-lbl">完了</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-total">10</div>
        <div class="stat-lbl">全種目</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--knee);" id="stat-knee">4</div>
        <div class="stat-lbl">膝ケア</div>
      </div>
    </div>
  </div>

  <!-- Warmup -->
  <div class="section-head">
    <span class="section-head-label">ウォームアップ</span>
    <div class="section-line"></div>
  </div>
  <div class="menu-list" id="menu-list"></div>

  <div class="start-wrap">
    <button class="btn-start" id="btn-start" onclick="startWorkout()">トレーニング開始</button>
  </div>
</div>

<!-- TIMER SCREEN -->
<div id="screen-timer" class="screen timer-screen">
  <div class="timer-progress-bar">
    <div class="timer-progress-fill" id="timer-progress-fill" style="width:0%"></div>
  </div>
  <div class="timer-body">
    <div class="timer-step-num" id="timer-step-num">STEP 1 / 10</div>
    <div class="timer-name" id="timer-name">ウォーキング</div>
    <div class="timer-detail" id="timer-detail">遠くを見ながら歩く</div>
    <div class="timer-sets" id="timer-sets">—</div>
    <div class="timer-circle">
      <svg class="timer-svg" width="200" height="200" viewBox="0 0 200 200">
        <circle class="timer-bg" cx="100" cy="100" r="88"/>
        <circle class="timer-arc" id="timer-arc" cx="100" cy="100" r="88"
          stroke-dasharray="552.9" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-count">
        <div class="timer-num" id="timer-num">02:00</div>
        <div class="timer-unit" id="timer-unit">残り時間</div>
      </div>
    </div>
    <div class="timer-controls">
      <button class="btn-ctrl btn-skip" onclick="skipStep()">↪</button>
      <button class="btn-ctrl btn-pause" id="btn-pause" onclick="togglePause()">一時停止</button>
      <button class="btn-ctrl btn-next" onclick="nextStep()">次へ →</button>
    </div>
  </div>
</div>

<!-- COMPLETE SCREEN -->
<div id="screen-complete" class="screen complete-screen">
  <div class="complete-icon">
    <svg viewBox="0 0 40 40" fill="none">
      <path d="M8 20 L16 28 L32 12" stroke="#1a2a00" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="complete-title">お疲れさまです！</div>
  <div class="complete-sub" id="complete-sub">昼休みメニュー完了</div>
  <div class="complete-stats">
    <div class="cstat"><div class="cstat-val">10</div><div class="cstat-lbl">種目完了</div></div>
    <div class="cstat"><div class="cstat-val" id="cstat-time">20分</div><div class="cstat-lbl">所要時間</div></div>
    <div class="cstat" style="grid-column:span 2;"><div class="cstat-val" style="color:var(--knee);">膝ケア</div><div class="cstat-lbl">クラムシェル・ヒップリフト・大腿四頭筋ストレッチ完了</div></div>
  </div>
  <button class="btn-start" onclick="resetApp()" style="max-width:300px;">もう一度やる</button>
</div>

<!-- REST OVERLAY -->
<div class="rest-overlay" id="rest-overlay">
  <div class="rest-label">REST</div>
  <div class="rest-num" id="rest-num">10</div>
  <div class="rest-next">次は <strong id="rest-next-name">—</strong></div>
</div>

<script>
const MENU = [
  { section:'ウォームアップ', name:'ウォーキング（外）', detail:'遠くを見ながら歩く', sets:'—', duration:120, knee:false, color:'#378ADD' },
  { section:'ストレッチ', name:'胸椎ストレッチ', detail:'四つ這いでキャットカウ・背骨全体を動かす', sets:'10回 × 2セット', duration:180, knee:false, color:'#7F77DD' },
  { section:'ストレッチ', name:'大腿四頭筋ストレッチ', detail:'立位でかかとをお尻へ・膝を揃えて30秒キープ', sets:'左右 30秒 × 2', duration:180, knee:true, color:'#7F77DD' },
  { section:'ストレッチ', name:'肩甲骨ほぐし', detail:'両腕を大きく後ろ回し・肩甲骨ごと動かす', sets:'前後 10回 × 2', duration:120, knee:false, color:'#7F77DD' },
  { section:'筋トレ', name:'クラムシェル', detail:'横向きに寝て上の膝だけ開く・中臀筋を鍛える', sets:'15回 × 2セット（両側）', duration:180, knee:true, color:'#1D9E75' },
  { section:'筋トレ', name:'ヒップリフト', detail:'仰向けで腰を持ち上げ2秒キープ・臀筋を意識', sets:'15回 × 2セット', duration:120, knee:true, color:'#1D9E75' },
  { section:'筋トレ', name:'サイドプランク', detail:'体幹の側面を鍛える・膝つきでもOK', sets:'30秒 × 2セット（両側）', duration:120, knee:false, color:'#1D9E75' },
  { section:'筋トレ', name:'カーフレイズ', detail:'2秒で上げて1秒キープ・2秒で下ろす', sets:'20回 × 2セット', duration:120, knee:false, color:'#1D9E75' },
  { section:'クールダウン', name:'深呼吸・切り替え', detail:'鼻から吸って口から吐く・午後モードへ', sets:'5回', duration:60, knee:false, color:'#378ADD' },
];

const REST_TIME = 10;
let currentStep = 0;
let timerInterval = null;
let restInterval = null;
let timeLeft = 0;
let paused = false;
let startTime = null;
let doneItems = new Set();

function buildMenu() {
  const list = document.getElementById('menu-list');
  list.innerHTML = '';
  let lastSection = '';
  MENU.forEach((item, i) => {
    if (item.section !== lastSection) {
      lastSection = item.section;
      if (i > 0) {
        list.insertAdjacentHTML('beforeend', `
          <div class="section-head" style="padding-left:0">
            <span class="section-head-label">${item.section}</span>
            <div class="section-line"></div>
          </div>`);
      }
    }
    const mins = Math.floor(item.duration / 60);
    list.insertAdjacentHTML('beforeend', `
      <div class="menu-item ${doneItems.has(i)?'done':''}" id="item-${i}" onclick="toggleItem(${i})">
        <div class="item-check"></div>
        <div class="item-body">
          <div class="item-name">${item.name}${item.knee?'<span class="knee-tag">膝ケア</span>':''}</div>
          <div class="item-meta">${item.sets}</div>
        </div>
        <div class="item-time">${mins}分</div>
      </div>`);
  });
  updateHomeStats();
}

function toggleItem(i) {
  if (doneItems.has(i)) doneItems.delete(i);
  else doneItems.add(i);
  document.getElementById(`item-${i}`).classList.toggle('done');
  updateHomeStats();
}

function updateHomeStats() {
  const done = doneItems.size;
  const total = MENU.length;
  const pct = Math.round(done / total * 100);
  document.getElementById('ring-pct').textContent = pct + '%';
  document.getElementById('stat-done').textContent = done;
  const circ = 213.6;
  document.getElementById('ring-fill').style.strokeDashoffset = circ - (circ * pct / 100);
  const remaining = MENU.filter((_,i) => !doneItems.has(i)).reduce((s,x)=>s+x.duration,0);
  const remMin = Math.ceil(remaining / 60);
  document.getElementById('ring-time-txt').innerHTML = `残り <span>${remMin}分</span>`;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startWorkout() {
  currentStep = 0;
  doneItems.clear();
  startTime = Date.now();
  showScreen('screen-timer');
  loadStep(currentStep);
}

function loadStep(i) {
  if (i >= MENU.length) { finishWorkout(); return; }
  const item = MENU[i];
  clearInterval(timerInterval);
  paused = false;
  timeLeft = item.duration;

  document.getElementById('timer-step-num').textContent = `STEP ${i+1} / ${MENU.length}`;
  document.getElementById('timer-name').textContent = item.name;
  document.getElementById('timer-detail').textContent = item.detail;
  document.getElementById('timer-sets').innerHTML = item.sets !== '—'
    ? `<span>${item.sets}</span>` : '—';

  const pct = i / MENU.length * 100;
  document.getElementById('timer-progress-fill').style.width = pct + '%';
  document.getElementById('btn-pause').textContent = '一時停止';

  document.getElementById('timer-arc').style.stroke = item.color;
  updateTimerDisplay();
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  const totalTime = MENU[currentStep].duration;
  timerInterval = setInterval(() => {
    if (paused) return;
    timeLeft--;
    updateTimerDisplay();
    const pct = (1 - timeLeft / totalTime);
    const circ = 552.9;
    document.getElementById('timer-arc').style.strokeDashoffset = circ * pct;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      if (currentStep < MENU.length - 1) showRest();
      else finishWorkout();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = timeLeft % 60;
  document.getElementById('timer-num').textContent =
    String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function togglePause() {
  paused = !paused;
  document.getElementById('btn-pause').textContent = paused ? '再開' : '一時停止';
}

function nextStep() {
  clearInterval(timerInterval);
  doneItems.add(currentStep);
  currentStep++;
  if (currentStep >= MENU.length) { finishWorkout(); return; }
  showRest();
}

function skipStep() {
  clearInterval(timerInterval);
  currentStep++;
  if (currentStep >= MENU.length) { finishWorkout(); return; }
  loadStep(currentStep);
}

function showRest() {
  doneItems.add(currentStep - 1 >= 0 ? currentStep - 1 : 0);
  const overlay = document.getElementById('rest-overlay');
  const nextItem = MENU[currentStep];
  document.getElementById('rest-next-name').textContent = nextItem ? nextItem.name : '—';
  let restLeft = REST_TIME;
  document.getElementById('rest-num').textContent = restLeft;
  overlay.classList.add('show');
  restInterval = setInterval(() => {
    restLeft--;
    document.getElementById('rest-num').textContent = restLeft;
    if (restLeft <= 0) {
      clearInterval(restInterval);
      overlay.classList.remove('show');
      loadStep(currentStep);
    }
  }, 1000);
}

function finishWorkout() {
  clearInterval(timerInterval);
  clearInterval(restInterval);
  MENU.forEach((_,i) => doneItems.add(i));
  const elapsed = Math.round((Date.now() - startTime) / 1000 / 60);
  document.getElementById('cstat-time').textContent = elapsed + '分';
  showScreen('screen-complete');
}

function resetApp() {
  doneItems.clear();
  currentStep = 0;
  clearInterval(timerInterval);
  clearInterval(restInterval);
  document.getElementById('rest-overlay').classList.remove('show');
  buildMenu();
  showScreen('screen-home');
}

buildMenu();

// ===== Wake Lock（スリープ防止）=====
let wakeLock = null;

async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch(e) {}
  }
}

async function releaseWakeLock() {
  if (wakeLock) {
    try { await wakeLock.release(); } catch(e) {}
    wakeLock = null;
  }
}

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && wakeLock === null) {
    const screen = document.querySelector('.screen.active');
    if (screen && screen.id === 'screen-timer') await requestWakeLock();
  }
});

const _origStartWorkout = startWorkout;
startWorkout = async function() {
  await requestWakeLock();
  _origStartWorkout();
};

const _origFinishWorkout = finishWorkout;
finishWorkout = function() {
  releaseWakeLock();
  _origFinishWorkout();
};

const _origResetApp = resetApp;
resetApp = function() {
  releaseWakeLock();
  _origResetApp();
};
</script>
